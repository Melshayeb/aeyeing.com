<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project View | Aeyeing Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style-kids.css?v=2">
    <style>
        :root {
            --lara-primary: #FF6B9D;
            --lara-secondary: #C44569;
            --adam-primary: #4FACFE;
            --adam-secondary: #00F2FE;
        }
        
        body {
            background: #0f0f23;
            color: #fff;
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
        }
        
        .project-page {
            max-width: 900px;
            margin: 0 auto;
            padding: 5rem 2rem 2rem;
        }
        
        .back-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .back-link {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }
        .back-link:hover { color: #fff; }
        
        .creator-badge {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .lara .creator-badge { background: rgba(255,107,157,0.2); color: #FF6B9D; }
        .adam .creator-badge { background: rgba(79,172,254,0.2); color: #4FACFE; }
        
        .project-hero {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 3rem;
            text-align: center;
            margin-bottom: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .project-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }
        
        .project-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
        
        .lara .project-title { color: var(--lara-primary); }
        .adam .project-title { color: var(--adam-primary); }
        
        .project-meta {
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
        }
        
        .project-content {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255,255,255,0.08);
        }
        
        .project-content h3 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            color: rgba(255,255,255,0.9);
        }
        
        .project-content p {
            color: rgba(255,255,255,0.7);
            line-height: 1.8;
            font-size: 1.05rem;
        }
        
        .project-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .gallery-item {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            border: 2px solid rgba(255,255,255,0.1);
        }
        
        .view-only-banner {
            background: rgba(255,255,255,0.05);
            border: 1px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .view-only-banner p {
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
        }
        
        .view-only-banner .lock {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        .reactions {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-top: 2rem;
        }
        
        .reaction-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 20px;
            padding: 0.5rem 1rem;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .reaction-btn:hover {
            transform: scale(1.2);
            background: rgba(255,255,255,0.2);
        }
        
        .visitor-reactions {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .reaction-bubble {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: rgba(255,255,255,0.05);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            margin: 0.3rem;
            animation: popIn 0.3s ease;
        }
        
        @keyframes popIn {
            0% { transform: scale(0); }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        @media (max-width: 768px) {
            .project-hero { padding: 2rem 1.5rem; }
            .project-title { font-size: 1.8rem; }
            .project-icon { font-size: 3.5rem; }
        }
    </style>
</head>
<body>
    <div class="project-page" id="projectPage">
        <!-- Content loaded by JS -->
    </div>

    <script>
        // Demo project data
        const projects = {
            'lara-art-1': {
                kid: 'lara',
                title: 'Sunset Dreams',
                icon: '🎨',
                category: 'Art',
                date: 'April 2026',
                description: 'This is my first digital painting. I used Procreate on my iPad to create this sunset landscape. The colors represent hope and dreams - the pink sky reminds me that every day ends beautifully no matter what happened.',
                gallery: ['🖼️', '🌅'],
                reactions: ['❤️', '🎨', '🔥']
            },
            'lara-code-1': {
                kid: 'lara',
                title: 'My First Python Game',
                icon: '💻',
                category: 'Code',
                date: 'March 2026',
                description: 'I created a number guessing game in Python! The computer picks a random number between 1 and 100, and you have to guess it. It tells you if your guess is too high or too low. I learned about loops, conditionals, and random numbers.',
                gallery: ['💻', '🎮'],
                reactions: ['🤯', '💻', '👏']
            },
            'lara-story-1': {
                kid: 'lara',
                title: 'The Robot Who Learned to Dream',
                icon: '📖',
                category: 'Writing',
                date: 'February 2026',
                description: 'A short story about a robot named Z-9 who discovers art and creativity. The robot was built to build cars but accidentally finds a paintbrush and realizes there is more to life than following instructions.',
                gallery: ['📖', '🤖'],
                reactions: ['❤️', '📖', '🤖']
            },
            'lara-art-2': {
                kid: 'lara',
                title: 'Abstract Thoughts',
                icon: '🖌️',
                category: 'Art',
                date: 'January 2026',
                description: 'An experiment with geometric shapes and bold colors. I wanted to express emotions without drawing recognizable objects. Each shape represents a different feeling.',
                gallery: ['🎨', '🖌️'],
                reactions: ['🎨', '🔥']
            },
            'adam-lego-1': {
                kid: 'adam',
                title: 'LEGO Mars Rover',
                icon: '🚀',
                category: 'LEGO',
                date: 'April 2026',
                description: 'I built a Mars rover that has wheels that can go over any surface! It has a camera arm, solar panels, and a little astronaut inside. I used 847 pieces and it took me 3 days.',
                gallery: ['🧱', '🚀'],
                reactions: ['🚀', '🔥', '👏']
            },
            'adam-game-1': {
                kid: 'adam',
                title: 'My Racing Game',
                icon: '🎮',
                category: 'Games',
                date: 'March 2026',
                description: 'I made a racing game where you drive a car and avoid obstacles. I designed 5 levels and each one gets harder. My friends think level 4 is really hard!',
                gallery: ['🎮', '🏎️'],
                reactions: ['🎮', '🔥']
            },
            'adam-nature-1': {
                kid: 'adam',
                title: 'Butterfly Collection',
                icon: '🦋',
                category: 'Nature',
                date: 'February 2026',
                description: 'I found 12 different butterflies in our garden and took photos of all of them. I looked up their names and wrote down what flowers they like. My favorite is the Monarch butterfly because it is orange and black.',
                gallery: ['🦋', '🌿'],
                reactions: ['🦋', '❤️', '🌿']
            },
            'adam-lego-2': {
                kid: 'adam',
                title: 'LEGO Castle',
                icon: '🏰',
                category: 'LEGO',
                date: 'January 2026',
                description: 'A big castle with 4 towers, a drawbridge that actually goes up and down, and a king and queen inside. There is even a dragon that guards the treasure room! It has 1200 pieces.',
                gallery: ['🏰', '🐉'],
                reactions: ['🏰', '👏']
            }
        };
        
        // Load project
        const params = new URLSearchParams(window.location.search);
        const projectId = params.get('id') || 'lara-art-1';
        const project = projects[projectId] || projects['lara-art-1'];
        const kid = project.kid;
        
        const page = document.getElementById('projectPage');
        page.className = `project-page ${kid}`;
        
        const backUrl = kid === 'lara' ? 'lara.html' : 'adam.html';
        
        page.innerHTML = `
            <div class="back-bar">
                <a href="${backUrl}" class="back-link">← Back to Lab</a>
                <span class="creator-badge">${kid === 'lara' ? '👧 Lara' : '👦 Adam'}'s Project</span>
            </div>
            
            <div class="project-hero">
                <div class="project-icon">${project.icon}</div>
                <h1 class="project-title">${project.title}</h1>
                <div class="project-meta">${project.category} • ${project.date}</div>
            </div>
            
            <div class="project-content">
                <h3>About This Project</h3>
                <p>${project.description}</p>
            </div>
            
            <div class="project-gallery">
                ${project.gallery.map(item => `
                    <div class="gallery-item">${item}</div>
                `).join('')}
            </div>
            
            <div class="view-only-banner">
                <div class="lock">🔒</div>
                <p>This project is for viewing only. Downloads are disabled to protect the creator's work.</p>
            </div>
            
            <div class="project-content">
                <h3>Leave a Reaction</h3>
                <div class="reactions" id="reactionButtons">
                    <button class="reaction-btn" data-emoji="❤️">❤️</button>
                    <button class="reaction-btn" data-emoji="🔥">🔥</button>
                    <button class="reaction-btn" data-emoji="🎉">🎉</button>
                    <button class="reaction-btn" data-emoji="👏">👏</button>
                    <button class="reaction-btn" data-emoji="🤯">🤯</button>
                    <button class="reaction-btn" data-emoji="💯">💯</button>
                </div>
                
                <div class="visitor-reactions" id="visitorReactions">
                    <!-- Visitor reactions appear here -->
                </div>
            </div>
        `;
        
        // Handle reactions
        const visitorReactions = document.getElementById('visitorReactions');
        
        document.querySelectorAll('.reaction-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const emoji = btn.dataset.emoji;
                const bubble = document.createElement('div');
                bubble.className = 'reaction-bubble';
                bubble.innerHTML = `<span>${emoji}</span> <span style="font-size:0.8rem;color:rgba(255,255,255,0.6)">Visitor</span>`;
                visitorReactions.appendChild(bubble);
                
                // Keep only last 20
                while(visitorReactions.children.length > 20) {
                    visitorReactions.removeChild(visitorReactions.firstChild);
                }
            });
        });
    </script>
</body>
</html>
