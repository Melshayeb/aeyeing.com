<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adam's Innovation Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style-kids.css?v=3">
    <style>
        :root {
            --primary: #4FACFE;
            --secondary: #00F2FE;
            --accent: #43CBFF;
            --bg-card: rgba(79,172,254,0.08);
        }
        .kid-section { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .lab-header {
            text-align: center;
            padding: 5rem 2rem 2rem;
        }
        .lab-header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, #4FACFE, #00F2FE);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .lab-header p {
            color: rgba(255,255,255,0.7);
            font-size: 1.2rem;
        }
        .upload-btn {
            position: fixed;
            bottom: 2rem; right: 2rem;
            width: 60px; height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4FACFE, #00F2FE);
            color: #fff;
            font-size: 2rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(79,172,254,0.4);
            z-index: 100;
            transition: transform 0.3s;
        }
        .upload-btn:hover { transform: scale(1.1); }
        
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            padding: 2rem 0;
        }
        
        .project-card {
            background: var(--bg-card);
            border: 2px solid rgba(79,172,254,0.2);
            border-radius: 16px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
            display: block;
            position: relative;
        }
        .project-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(79,172,254,0.2);
        }
        .project-card .card-actions {
            position: absolute;
            top: 0.8rem;
            right: 0.8rem;
            display: flex;
            gap: 0.5rem;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .project-card:hover .card-actions {
            opacity: 1;
        }
        .card-actions button {
            width: 32px; height: 32px;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.15);
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .card-actions button:hover {
            background: var(--primary);
            transform: scale(1.1);
        }
        .project-card .preview {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .project-card h3 {
            font-size: 1.2rem;
            color: var(--primary);
            margin-bottom: 0.3rem;
            padding-right: 70px;
        }
        .project-card p {
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
        }
        .project-card .date {
            color: rgba(255,255,255,0.4);
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }
        
        .add-card {
            border: 2px dashed rgba(79,172,254,0.4);
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 280px;
        }
        .add-card:hover {
            background: rgba(79,172,254,0.05);
        }
        .add-card .plus {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }
        .modal-overlay.active { display: flex; }
        
        .modal-box {
            background: #1a1a2e;
            border: 1px solid rgba(79,172,254,0.3);
            border-radius: 20px;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            position: relative;
        }
        .modal-box h2 {
            color: var(--primary);
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .modal-box input, .modal-box textarea, .modal-box select {
            width: 100%;
            padding: 0.8rem 1rem;
            margin-bottom: 1rem;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
        }
        .modal-box input:focus, .modal-box textarea:focus, .modal-box select:focus {
            outline: none;
            border-color: var(--primary);
        }
        .modal-box input::placeholder, .modal-box textarea::placeholder {
            color: rgba(255,255,255,0.4);
        }
        .drop-zone {
            border: 2px dashed rgba(79,172,254,0.4);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .drop-zone:hover {
            border-color: var(--primary);
            background: rgba(79,172,254,0.05);
        }
        .drop-zone span {
            color: rgba(255,255,255,0.6);
        }
        .modal-box button[type="submit"] {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #4FACFE, #00F2FE);
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
        }
        .modal-box .delete-btn {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            margin-top: 0.5rem;
        }
        .modal-close {
            position: absolute;
            top: 1rem; right: 1rem;
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .confirm-modal {
            text-align: center;
        }
        .confirm-modal p {
            color: rgba(255,255,255,0.8);
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
        }
        .confirm-buttons {
            display: flex;
            gap: 1rem;
        }
        .confirm-buttons button {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
        }
        .confirm-yes {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: #fff;
        }
        .confirm-no {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        .no-download {
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <nav class="kids-nav">
        <div class="nav-inner">
            <a href="index.html" class="back-link">← Back to Aeyeing</a>
            <span class="lab-title">🚀 Adam's Lab</span>
        </div>
    </nav>

    <header class="lab-header">
        <h1>ADAM'S LAB</h1>
        <p>My space for builds, games, and discoveries</p>
    </header>

    <section class="kid-section">
        <div class="projects-grid" id="projectsGrid">
            <!-- Projects loaded by JS -->
        </div>
    </section>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="projectModal">
        <div class="modal-box">
            <button class="modal-close" id="modalClose">×</button>
            <h2 id="modalTitle">🚀 New Project</h2>
            <form id="projectForm">
                <input type="hidden" id="projectId">
                <input type="text" id="projectTitle" placeholder="Project Title" required>
                <select id="projectCategory" required>
                    <option value="">Select Category</option>
                    <option value="lego">🧱 LEGO</option>
                    <option value="games">🎮 Games</option>
                    <option value="nature">🌿 Nature</option>
                    <option value="other">🌟 Other</option>
                </select>
                <textarea id="projectDesc" placeholder="Tell us about your project..." rows="3" required></textarea>
                <div class="drop-zone" id="dropZone">
                    <span>📁 Drop your files here or click to browse</span>
                    <input type="file" id="fileInput" multiple style="display:none">
                </div>
                <button type="submit" id="submitBtn">🚀 Launch Project</button>
                <button type="button" class="delete-btn" id="deleteBtn" style="display:none">🗑️ Delete Project</button>
            </form>
            <p class="no-download">🔒 Only you can view your uploads</p>
        </div>
    </div>

    <!-- Confirm Delete Modal -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal-box confirm-modal">
            <h2>🗑️ Delete Project?</h2>
            <p>Are you sure? This cannot be undone!</p>
            <div class="confirm-buttons">
                <button class="confirm-no" id="confirmNo">Keep It</button>
                <button class="confirm-yes" id="confirmYes">Delete Forever</button>
            </div>
        </div>
    </div>

    <button class="upload-btn" id="fabBtn">+</button>

    <footer class="kids-footer">
        <p>Adam's Innovation Lab | Part of Aeyeing</p>
    </footer>

    <script>
        // Icons for categories
        const categoryIcons = {
            lego: '🧱', games: '🎮', nature: '🌿', other: '🌟'
        };

        // Default projects
        const defaultProjects = [
            { id: 'adam-1', title: 'LEGO Mars Rover', category: 'lego', desc: 'Spaceship that can drive on any surface', date: 'April 2026' },
            { id: 'adam-2', title: 'My Racing Game', category: 'games', desc: 'Car game I designed with obstacles', date: 'March 2026' },
            { id: 'adam-3', title: 'Butterfly Collection', category: 'nature', desc: 'Photos and facts about butterflies I found', date: 'February 2026' },
            { id: 'adam-4', title: 'LEGO Castle', category: 'lego', desc: 'Big castle with towers and a drawbridge', date: 'January 2026' }
        ];

        // Load from localStorage or use defaults
        function loadProjects() {
            const stored = localStorage.getItem('adamProjects');
            if (stored) return JSON.parse(stored);
            localStorage.setItem('adamProjects', JSON.stringify(defaultProjects));
            return defaultProjects;
        }

        function saveProjects(projects) {
            localStorage.setItem('adamProjects', JSON.stringify(projects));
        }

        let projects = loadProjects();
        let editingId = null;
        let deletingId = null;

        // Render projects
        function renderProjects() {
            const grid = document.getElementById('projectsGrid');
            grid.innerHTML = projects.map(p => `
                <div class="project-card" data-id="${p.id}">
                    <div class="card-actions">
                        <button onclick="event.stopPropagation(); editProject('${p.id}')" title="Edit">✏️</button>
                        <button onclick="event.stopPropagation(); confirmDelete('${p.id}')" title="Delete">🗑️</button>
                    </div>
                    <a href="project.html?id=${p.id}&kid=adam" style="text-decoration:none;color:inherit;display:block;">
                        <div class="preview">${categoryIcons[p.category] || '🌟'}</div>
                        <h3>${p.title}</h3>
                        <p>${p.desc}</p>
                        <div class="date">${p.date}</div>
                    </a>
                </div>
            `).join('');

            // Add "Add New" card
            const addCard = document.createElement('div');
            addCard.className = 'project-card add-card';
            addCard.id = 'addBtn';
            addCard.innerHTML = `
                <div class="plus">➕</div>
                <h3>Add New Project</h3>
                <p>Share something new!</p>
            `;
            grid.appendChild(addCard);

            // Re-attach event
            document.getElementById('addBtn').addEventListener('click', () => openModal());
        }

        // Modal handling
        const modal = document.getElementById('projectModal');
        const confirmModal = document.getElementById('confirmModal');
        const modalClose = document.getElementById('modalClose');
        const fabBtn = document.getElementById('fabBtn');
        const form = document.getElementById('projectForm');
        const deleteBtn = document.getElementById('deleteBtn');

        function openModal(editId = null) {
            editingId = editId;
            const title = document.getElementById('modalTitle');
            const submitBtn = document.getElementById('submitBtn');

            if (editId) {
                const p = projects.find(x => x.id === editId);
                document.getElementById('projectId').value = p.id;
                document.getElementById('projectTitle').value = p.title;
                document.getElementById('projectCategory').value = p.category;
                document.getElementById('projectDesc').value = p.desc;
                title.textContent = '✏️ Edit Project';
                submitBtn.textContent = '💾 Save Changes';
                deleteBtn.style.display = 'block';
            } else {
                form.reset();
                document.getElementById('projectId').value = '';
                title.textContent = '🚀 New Project';
                submitBtn.textContent = '🚀 Launch Project';
                deleteBtn.style.display = 'none';
            }

            modal.classList.add('active');
        }

        function closeModalFn() {
            modal.classList.remove('active');
            editingId = null;
        }

        modalClose.addEventListener('click', closeModalFn);
        fabBtn.addEventListener('click', () => openModal());
        modal.addEventListener('click', (e) => {
            if(e.target === modal) closeModalFn();
        });

        // Edit
        window.editProject = function(id) {
            openModal(id);
        };

        // Delete
        window.confirmDelete = function(id) {
            deletingId = id;
            confirmModal.classList.add('active');
        };

        document.getElementById('confirmNo').addEventListener('click', () => {
            confirmModal.classList.remove('active');
            deletingId = null;
        });

        document.getElementById('confirmYes').addEventListener('click', () => {
            if (deletingId) {
                projects = projects.filter(p => p.id !== deletingId);
                saveProjects(projects);
                renderProjects();
                deletingId = null;
            }
            confirmModal.classList.remove('active');
            closeModalFn();
        });

        confirmModal.addEventListener('click', (e) => {
            if(e.target === confirmModal) confirmModal.classList.remove('active');
        });

        deleteBtn.addEventListener('click', () => {
            if (editingId) {
                confirmModal.classList.add('active');
                deletingId = editingId;
            }
        });

        // Form submit
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const title = document.getElementById('projectTitle').value;
            const category = document.getElementById('projectCategory').value;
            const desc = document.getElementById('projectDesc').value;

            if (editingId) {
                const idx = projects.findIndex(p => p.id === editingId);
                projects[idx] = { ...projects[idx], title, category, desc };
            } else {
                const id = 'adam-' + Date.now();
                projects.unshift({
                    id, title, category, desc,
                    date: new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' })
                });
            }

            saveProjects(projects);
            renderProjects();
            closeModalFn();
        });

        // Drop zone
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#4FACFE';
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = '';
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '';
            dropZone.querySelector('span').textContent = `📁 ${e.dataTransfer.files.length} file(s) selected`;
        });
        fileInput.addEventListener('change', () => {
            dropZone.querySelector('span').textContent = `📁 ${fileInput.files.length} file(s) selected`;
        });

        // Particles
        const particlesContainer = document.getElementById('particles');
        for(let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 20 + 's';
            p.style.animationDuration = (15 + Math.random() * 20) + 's';
            p.style.background = ['#4FACFE', '#00F2FE', '#43CBFF'][Math.floor(Math.random()*3)];
            particlesContainer.appendChild(p);
        }

        // Initial render
        renderProjects();
    </script>
</body>
</html>
