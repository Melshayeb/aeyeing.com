<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lara's Innovation Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style-kids.css?v=4">
    <style>
        :root {
            --primary: #FF6B9D;
            --secondary: #C44569;
            --accent: #FF8EAB;
            --bg-card: rgba(255,107,157,0.08);
        }
        .kid-section { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .lab-header {
            text-align: center;
            padding: 5rem 2rem 2rem;
        }
        .lab-header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, #FF6B9D, #FF8EAB);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .lab-header p {
            color: rgba(255,255,255,0.7);
            font-size: 1.2rem;
        }
        .upload-btn {
            position: fixed;
            bottom: 2rem; right: 2rem;
            width: 60px; height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF6B9D, #C44569);
            color: #fff;
            font-size: 2rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255,107,157,0.4);
            z-index: 100;
            transition: transform 0.3s;
        }
        .upload-btn:hover { transform: scale(1.1); }

        /* Pin button */
        .pin-btn {
            position: absolute;
            top: 0.8rem;
            left: 0.8rem;
            width: 32px; height: 32px;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            opacity: 0;
        }
        .project-card:hover .pin-btn {
            opacity: 1;
        }
        .pin-btn.pinned {
            opacity: 1 !important;
            background: var(--primary);
            color: #fff;
        }
        .project-card.pinned {
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(255,107,157,0.3);
            order: -1;
        }

        /* Drag handle */
        .drag-handle {
            position: absolute;
            top: 50%; left: 0.5rem;
            transform: translateY(-50%);
            width: 20px; height: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 3px;
            cursor: grab;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .project-card:hover .drag-handle {
            opacity: 0.5;
        }
        .drag-handle span {
            width: 12px; height: 2px;
            background: rgba(255,255,255,0.5);
            border-radius: 1px;
        }
        .drag-handle:active {
            cursor: grabbing;
        }
        .project-card.dragging {
            opacity: 0.5;
            transform: scale(0.95);
        }
        .project-card.drag-over {
            border-color: var(--primary);
            transform: translateY(5px);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            padding: 2rem 0;
        }

        .project-card {
            background: var(--bg-card);
            border: 2px solid rgba(255,107,157,0.2);
            border-radius: 16px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
            display: block;
            position: relative;
        }
        .project-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(255,107,157,0.2);
        }
        .project-card .card-actions {
            position: absolute;
            top: 0.8rem;
            right: 0.8rem;
            display: flex;
            gap: 0.5rem;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .project-card:hover .card-actions {
            opacity: 1;
        }
        .card-actions button {
            width: 32px; height: 32px;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.15);
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .card-actions button:hover {
            background: var(--primary);
            transform: scale(1.1);
        }
        .project-card .preview {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            margin-bottom: 1rem;
            overflow: hidden;
        }
        .project-card .preview img {
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }
        .project-card h3 {
            font-size: 1.2rem;
            color: var(--primary);
            margin-bottom: 0.3rem;
            padding-right: 70px;
            padding-left: 20px;
        }
        .project-card p {
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
        }
        .project-card .date {
            color: rgba(255,255,255,0.4);
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }

        .add-card {
            border: 2px dashed rgba(255,107,157,0.4);
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 280px;
        }
        .add-card:hover {
            background: rgba(255,107,157,0.05);
        }
        .add-card .plus {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }
        .modal-overlay.active { display: flex; }

        .modal-box {
            background: #1a1a2e;
            border: 1px solid rgba(255,107,157,0.3);
            border-radius: 20px;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            position: relative;
        }
        .modal-box h2 {
            color: var(--primary);
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .modal-box input, .modal-box textarea, .modal-box select {
            width: 100%;
            padding: 0.8rem 1rem;
            margin-bottom: 1rem;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
        }
        .modal-box input:focus, .modal-box textarea:focus, .modal-box select:focus {
            outline: none;
            border-color: var(--primary);
        }
        .modal-box input::placeholder, .modal-box textarea::placeholder {
            color: rgba(255,255,255,0.4);
        }
        .drop-zone {
            border: 2px dashed rgba(255,107,157,0.4);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .drop-zone:hover {
            border-color: var(--primary);
            background: rgba(255,107,157,0.05);
        }
        .drop-zone span {
            color: rgba(255,255,255,0.6);
        }
        .drop-zone.has-image {
            padding: 0;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .drop-zone.has-image img {
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .modal-box button[type="submit"] {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #FF6B9D, #C44569);
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
        }
        .modal-box .delete-btn {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            margin-top: 0.5rem;
        }
        .modal-close {
            position: absolute;
            top: 1rem; right: 1rem;
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .confirm-modal {
            text-align: center;
        }
        .confirm-modal p {
            color: rgba(255,255,255,0.8);
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
        }
        .confirm-buttons {
            display: flex;
            gap: 1rem;
        }
        .confirm-buttons button {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
        }
        .confirm-yes {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: #fff;
        }
        .confirm-no {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .no-download {
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <nav class="kids-nav">
        <div class="nav-inner">
            <a href="index.html" class="back-link">← Back to Aeyeing</a>
            <span class="lab-title">🎨 Lara's Lab</span>
        </div>
    </nav>

    <header class="lab-header">
        <h1>LARA'S LAB</h1>
        <p>My creative space for art, code, and stories</p>
    </header>

    <section class="kid-section">
        <div class="projects-grid" id="projectsGrid">
            <!-- Projects loaded by JS -->
        </div>
    </section>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="projectModal">
        <div class="modal-box">
            <button class="modal-close" id="modalClose">×</button>
            <h2 id="modalTitle">🚀 New Project</h2>
            <form id="projectForm">
                <input type="hidden" id="projectId">
                <input type="text" id="projectTitle" placeholder="Project Title" required>
                <select id="projectCategory" required>
                    <option value="">Select Category</option>
                    <option value="art">🎨 Art</option>
                    <option value="code">💻 Code</option>
                    <option value="writing">✍️ Writing</option>
                    <option value="other">🌟 Other</option>
                </select>
                <textarea id="projectDesc" placeholder="Tell us about your project..." rows="3" required></textarea>
                <div class="drop-zone" id="dropZone">
                    <span id="dropText">📁 Drop your files here or click to browse</span>
                    <img id="dropPreview" style="display:none">
                    <input type="file" id="fileInput" accept="image/*" style="display:none">
                </div>
                <button type="submit" id="submitBtn">🚀 Launch Project</button>
                <button type="button" class="delete-btn" id="deleteBtn" style="display:none">🗑️ Delete Project</button>
            </form>
            <p class="no-download">🔒 Only you can view your uploads</p>
        </div>
    </div>

    <!-- Confirm Delete Modal -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal-box confirm-modal">
            <h2>🗑️ Delete Project?</h2>
            <p>Are you sure? This cannot be undone!</p>
            <div class="confirm-buttons">
                <button class="confirm-no" id="confirmNo">Keep It</button>
                <button class="confirm-yes" id="confirmYes">Delete Forever</button>
            </div>
        </div>
    </div>

    <button class="upload-btn" id="fabBtn">+</button>

    <footer class="kids-footer">
        <p>Lara's Innovation Lab | Part of Aeyeing</p>
    </footer>

    <script>
        const categoryIcons = {
            art: '🎨', code: '💻', writing: '✍️', other: '🌟'
        };

        const defaultProjects = [
            { id: 'lara-1', title: 'Sunset Dreams', category: 'art', desc: 'Digital painting of my favorite sunset', date: 'April 2026', pinned: true, image: null },
            { id: 'lara-2', title: 'My First Python Game', category: 'code', desc: 'A number guessing game I made at school', date: 'March 2026', pinned: false, image: null },
            { id: 'lara-3', title: 'The Robot Who Learned to Dream', category: 'writing', desc: 'Short story about AI finding creativity', date: 'February 2026', pinned: false, image: null },
            { id: 'lara-4', title: 'Abstract Thoughts', category: 'art', desc: 'Experiment with shapes and colors', date: 'January 2026', pinned: false, image: null }
        ];

        function loadProjects() {
            const stored = localStorage.getItem('laraProjects');
            if (stored) return JSON.parse(stored);
            localStorage.setItem('laraProjects', JSON.stringify(defaultProjects));
            return defaultProjects;
        }

        function saveProjects(projects) {
            localStorage.setItem('laraProjects', JSON.stringify(projects));
        }

        let projects = loadProjects();
        let editingId = null;
        let deletingId = null;
        let draggedItem = null;
        let currentImage = null;

        function renderProjects() {
            const grid = document.getElementById('projectsGrid');
            // Sort: pinned first, then by original order
            const sorted = [...projects].sort((a, b) => {
                if (a.pinned && !b.pinned) return -1;
                if (!a.pinned && b.pinned) return 1;
                return 0;
            });

            grid.innerHTML = sorted.map((p, index) => `
                <div class="project-card ${p.pinned ? 'pinned' : ''}" data-id="${p.id}" draggable="true">
                    <button class="pin-btn ${p.pinned ? 'pinned' : ''}" onclick="event.stopPropagation(); togglePin('${p.id}')" title="${p.pinned ? 'Unpin' : 'Pin to top'}">
                        ${p.pinned ? '📌' : '📍'}
                    </button>
                    <div class="drag-handle" title="Drag to reorder">
                        <span></span><span></span><span></span>
                    </div>
                    <div class="card-actions">
                        <button onclick="event.stopPropagation(); editProject('${p.id}')" title="Edit">✏️</button>
                        <button onclick="event.stopPropagation(); confirmDelete('${p.id}')" title="Delete">🗑️</button>
                    </div>
                    <a href="project.html?id=${p.id}&kid=lara" style="text-decoration:none;color:inherit;display:block;">
                        <div class="preview">
                            ${p.image ? `<img src="${p.image}" alt="${p.title}">` : (categoryIcons[p.category] || '🌟')}
                        </div>
                        <h3>${p.title}</h3>
                        <p>${p.desc}</p>
                        <div class="date">${p.date}</div>
                    </a>
                </div>
            `).join('');

            // Add "Add New" card
            const addCard = document.createElement('div');
            addCard.className = 'project-card add-card';
            addCard.id = 'addBtn';
            addCard.innerHTML = `
                <div class="plus">➕</div>
                <h3>Add New Project</h3>
                <p>Share something new!</p>
            `;
            grid.appendChild(addCard);
            document.getElementById('addBtn').addEventListener('click', () => openModal());

            // Setup drag and drop
            setupDragAndDrop();
        }

        function setupDragAndDrop() {
            const cards = document.querySelectorAll('.project-card[data-id]');
            cards.forEach(card => {
                card.addEventListener('dragstart', handleDragStart);
                card.addEventListener('dragend', handleDragEnd);
                card.addEventListener('dragover', handleDragOver);
                card.addEventListener('drop', handleDrop);
                card.addEventListener('dragenter', handleDragEnter);
                card.addEventListener('dragleave', handleDragLeave);
            });
        }

        function handleDragStart(e) {
            draggedItem = this;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragEnd(e) {
            this.classList.remove('dragging');
            document.querySelectorAll('.project-card').forEach(c => c.classList.remove('drag-over'));
            draggedItem = null;
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }

        function handleDragEnter(e) {
            if (this !== draggedItem && this.dataset.id) {
                this.classList.add('drag-over');
            }
        }

        function handleDragLeave(e) {
            this.classList.remove('drag-over');
        }

        function handleDrop(e) {
            e.preventDefault();
            this.classList.remove('drag-over');

            if (this === draggedItem || !this.dataset.id || !draggedItem) return;

            const draggedId = draggedItem.dataset.id;
            const targetId = this.dataset.id;

            const draggedIndex = projects.findIndex(p => p.id === draggedId);
            const targetIndex = projects.findIndex(p => p.id === targetId);

            if (draggedIndex > -1 && targetIndex > -1) {
                const [removed] = projects.splice(draggedIndex, 1);
                projects.splice(targetIndex, 0, removed);
                saveProjects(projects);
                renderProjects();
            }
        }

        // Pin toggle
        window.togglePin = function(id) {
            const idx = projects.findIndex(p => p.id === id);
            if (idx > -1) {
                projects[idx].pinned = !projects[idx].pinned;
                saveProjects(projects);
                renderProjects();
            }
        };

        // Modal
        const modal = document.getElementById('projectModal');
        const confirmModal = document.getElementById('confirmModal');
        const modalClose = document.getElementById('modalClose');
        const fabBtn = document.getElementById('fabBtn');
        const form = document.getElementById('projectForm');
        const deleteBtn = document.getElementById('deleteBtn');

        function openModal(editId = null) {
            editingId = editId;
            currentImage = null;
            const title = document.getElementById('modalTitle');
            const submitBtn = document.getElementById('submitBtn');
            const dropZone = document.getElementById('dropZone');
            const dropText = document.getElementById('dropText');
            const dropPreview = document.getElementById('dropPreview');

            dropZone.classList.remove('has-image');
            dropText.style.display = 'block';
            dropPreview.style.display = 'none';
            dropPreview.src = '';

            if (editId) {
                const p = projects.find(x => x.id === editId);
                document.getElementById('projectId').value = p.id;
                document.getElementById('projectTitle').value = p.title;
                document.getElementById('projectCategory').value = p.category;
                document.getElementById('projectDesc').value = p.desc;
                if (p.image) {
                    currentImage = p.image;
                    dropZone.classList.add('has-image');
                    dropText.style.display = 'none';
                    dropPreview.style.display = 'block';
                    dropPreview.src = p.image;
                }
                title.textContent = '✏️ Edit Project';
                submitBtn.textContent = '💾 Save Changes';
                deleteBtn.style.display = 'block';
            } else {
                form.reset();
                document.getElementById('projectId').value = '';
                title.textContent = '🚀 New Project';
                submitBtn.textContent = '🚀 Launch Project';
                deleteBtn.style.display = 'none';
            }

            modal.classList.add('active');
        }

        function closeModalFn() {
            modal.classList.remove('active');
            editingId = null;
            currentImage = null;
        }

        modalClose.addEventListener('click', closeModalFn);
        fabBtn.addEventListener('click', () => openModal());
        modal.addEventListener('click', (e) => {
            if(e.target === modal) closeModalFn();
        });

        window.editProject = function(id) {
            openModal(id);
        };

        window.confirmDelete = function(id) {
            deletingId = id;
            confirmModal.classList.add('active');
        };

        document.getElementById('confirmNo').addEventListener('click', () => {
            confirmModal.classList.remove('active');
            deletingId = null;
        });

        document.getElementById('confirmYes').addEventListener('click', () => {
            if (deletingId) {
                projects = projects.filter(p => p.id !== deletingId);
                saveProjects(projects);
                renderProjects();
                deletingId = null;
            }
            confirmModal.classList.remove('active');
            closeModalFn();
        });

        confirmModal.addEventListener('click', (e) => {
            if(e.target === confirmModal) confirmModal.classList.remove('active');
        });

        deleteBtn.addEventListener('click', () => {
            if (editingId) {
                confirmModal.classList.add('active');
                deletingId = editingId;
            }
        });

        // Image upload handling
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const dropText = document.getElementById('dropText');
        const dropPreview = document.getElementById('dropPreview');

        function handleImageFile(file) {
            if (!file || !file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                currentImage = e.target.result;
                dropZone.classList.add('has-image');
                dropText.style.display = 'none';
                dropPreview.style.display = 'block';
                dropPreview.src = currentImage;
            };
            reader.readAsDataURL(file);
        }

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#FF6B9D';
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = '';
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '';
            if (e.dataTransfer.files.length) {
                handleImageFile(e.dataTransfer.files[0]);
            }
        });
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) {
                handleImageFile(fileInput.files[0]);
            }
        });

        // Form submit
        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const title = document.getElementById('projectTitle').value;
            const category = document.getElementById('projectCategory').value;
            const desc = document.getElementById('projectDesc').value;

            if (editingId) {
                const idx = projects.findIndex(p => p.id === editingId);
                projects[idx] = {
                    ...projects[idx],
                    title, category, desc,
                    image: currentImage || projects[idx].image
                };
            } else {
                const id = 'lara-' + Date.now();
                projects.unshift({
                    id, title, category, desc,
                    image: currentImage,
                    date: new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' }),
                    pinned: false
                });
            }

            saveProjects(projects);
            renderProjects();
            closeModalFn();
        });

        // Particles
        const particlesContainer = document.getElementById('particles');
        for(let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 20 + 's';
            p.style.animationDuration = (15 + Math.random() * 20) + 's';
            p.style.background = ['#FF6B9D', '#FF8EAB', '#C44569'][Math.floor(Math.random()*3)];
            particlesContainer.appendChild(p);
        }

        // Initial render
        renderProjects();
    </script>
</body>
</html>
